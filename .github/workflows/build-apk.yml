name: Build AmmiAI APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Load backend URL from backend-url.txt
        run: |
          URL=$(cat ../backend-url.txt | tr -d ' \n')
          if [ -z "$URL" ]; then echo "backend-url.txt is empty!"; exit 1; fi
          echo "EXPO_PUBLIC_BACKEND_URL=$URL" >> $GITHUB_ENV
          echo "Building against backend: $URL"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate native Android project (Expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build release APK (debug-signed, installable)
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmmiAI-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk
